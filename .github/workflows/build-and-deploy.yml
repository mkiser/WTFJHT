name: Build and Deploy WTF Just Happened Today? Jekyll Site

on:
  push:
    branches:
      - master
  workflow_dispatch:  # allow manual triggering

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      JEKYLL_ENV: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for post changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
          elif ! CHANGED=$(git diff --name-only "${{ github.event.before }}" HEAD 2>/dev/null); then
            # git diff failed (e.g., force-push beyond fetch-depth) — full build as fail-safe
            echo "full_build=true" >> "$GITHUB_OUTPUT"
          elif echo "$CHANGED" | grep -qE '^(_posts/|_plugins/(search_index|sources_leaderboard)|_data/tag_taxonomy)'; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "full_build=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Full build: $(cat "$GITHUB_OUTPUT")"

          # Extract dates from changed post filenames for incremental OTD generation
          # Post filenames: _posts/YYYY-MM-DD-*.markdown → "monthname-day" slugs
          MONTHS="january february march april may june july august september october november december"
          DATES=""
          for f in $(echo "$CHANGED" 2>/dev/null | grep '^_posts/' || true); do
            if echo "$f" | grep -qE '^_posts/[0-9]{4}-[0-9]{2}-[0-9]{2}'; then
              MM=$(echo "$f" | sed 's|^_posts/[0-9]*-\([0-9]*\)-[0-9]*-.*|\1|')
              DD=$(echo "$f" | sed 's|^_posts/[0-9]*-[0-9]*-\([0-9]*\)-.*|\1|' | sed 's/^0//')
              MONTH_NAME=$(echo "$MONTHS" | tr ' ' '\n' | sed -n "${MM##0}p")
              if [ -n "$MONTH_NAME" ] && [ -n "$DD" ]; then
                DATES="$DATES${DATES:+,}${MONTH_NAME}-${DD}"
              fi
            fi
          done
          echo "changed_dates=$DATES" >> "$GITHUB_OUTPUT"
          echo "Changed dates: $DATES"

      - name: Set up Ruby with caching
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.5
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          SKIP_SEARCH_INDEX: ${{ steps.check.outputs.full_build == 'false' && 'true' || 'false' }}
          SKIP_LEADERBOARD: ${{ steps.check.outputs.full_build == 'false' && 'true' || 'false' }}
          CHANGED_DATES: ${{ steps.check.outputs.changed_dates }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          BUCKET=s3://whatthefuckjusthappenedtoday.com

          # Pass 1: HTML — browsers revalidate at 5min, CF edge caches 1hr
          aws s3 cp _site/ $BUCKET/ --recursive --only-show-errors \
            --acl public-read \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=300, s-maxage=3600" &
          PID1=$!

          # Pass 2: Search index — short browser cache like HTML (only exists on full builds)
          if [ -f _site/search-index.json ]; then
            aws s3 cp _site/search-index.json $BUCKET/search-index.json --only-show-errors \
              --acl public-read \
              --cache-control "public, max-age=300, s-maxage=3600" &
            PID2=$!
          else
            PID2=""
          fi

          # Pass 3: Other dynamic data (feeds, sitemap) — 1hr cache
          aws s3 cp _site/ $BUCKET/ --recursive --only-show-errors \
            --acl public-read \
            --exclude "*" \
            --include "*.json" --include "*.xml" \
            --exclude "search-index.json" \
            --cache-control "public, max-age=3600" &
          PID3=$!

          # Pass 4: Static assets (CSS, JS, images, fonts) — 1-day cache
          aws s3 cp _site/ $BUCKET/ --recursive --only-show-errors \
            --acl public-read \
            --exclude "*.html" --exclude "*.json" --exclude "*.xml" \
            --cache-control "public, max-age=86400" &
          PID4=$!

          # Wait for all passes and fail if any failed
          FAILED=0
          for PID in $PID1 $PID2 $PID3 $PID4; do
            [ -z "$PID" ] && continue
            wait $PID || FAILED=1
          done
          if [ $FAILED -ne 0 ]; then
            echo "ERROR: One or more S3 upload passes failed"
            exit 1
          fi

      - name: Purge Cloudflare cache
        run: |
          curl -X DELETE "https://api.cloudflare.com/client/v4/zones/2fa02b93146397fbf2001d812ab8b31f/purge_cache" \
          -H "X-Auth-Email: ${{ secrets.CLOUD_FLARE_EMAIL }}" \
          -H "X-Auth-Key: ${{ secrets.CLOUD_FLARE_API_KEY }}" \
          -H "Content-Type: application/json" \
          --data '{"purge_everything":true}'

      - name: Ping search engines and feeds
        run: |
          # Run all pings in parallel
          BASE=https://whatthefuckjusthappenedtoday.com
          HUB=https://pubsubhubbub.appspot.com/
          AUTH_DATE=$(date +%s)
          AUTH_HASH=$(echo -n "${{ secrets.PODCAST_INDEX_API_KEY }}${{ secrets.PODCAST_INDEX_API_SECRET }}${AUTH_DATE}" | sha1sum | awk '{print $1}')

          # WebSub hub
          curl -s -X POST "$HUB" -d "hub.mode=publish" \
            -d "hub.url=$BASE/rss.xml" \
            -d "hub.url=$BASE/atom.xml" \
            -d "hub.url=$BASE/feed.json" \
            -d "hub.url=$BASE/podcasts/index.xml" &

          # Podcast Index
          curl -s -X POST "https://api.podcastindex.org/api/1.0/hub/pubnotify" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -H "X-Auth-Key: ${{ secrets.PODCAST_INDEX_API_KEY }}" \
            -H "X-Auth-Date: ${AUTH_DATE}" \
            -H "Authorization: ${AUTH_HASH}" \
            -d "url=$BASE/podcasts/index.xml" &

          # Wait for all background jobs
          wait
            
      - name: Post-deploy smoke test
        run: |
          echo "Waiting for Cloudflare cache purge to propagate..."
          sleep 5
          echo "Running smoke tests..."
          curl -sf https://whatthefuckjusthappenedtoday.com/ > /dev/null || { echo "FAIL: Homepage unreachable"; exit 1; }
          curl -sf https://whatthefuckjusthappenedtoday.com/rss.xml > /dev/null || { echo "FAIL: RSS feed unreachable"; exit 1; }
          curl -sf https://whatthefuckjusthappenedtoday.com/search-index.json > /dev/null || { echo "FAIL: Search index unreachable"; exit 1; }
          echo "All smoke tests passed."

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then COLOR="#36a64f"; else COLOR="#ff0000"; fi
          jq -n \
            --arg color "$COLOR" \
            --arg text "$WORKFLOW_NAME #$RUN_NUMBER by $ACTOR - $JOB_STATUS" \
            '{
              "username": "WTFJHT Bot",
              "icon_emoji": ":newspaper:",
              "attachments": [{
                "color": $color,
                "title": "GitHub Actions Build",
                "text": $text
              }]
            }' | curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d @-
