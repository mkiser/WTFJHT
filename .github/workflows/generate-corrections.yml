name: Generate Corrections Data

on:
  schedule:
    # Daily at 6:30am UTC (10:30pm PT / 1:30am ET) — offset from tag pages
    # (6:00) so the two auto-commit pushes to master never race.
    - cron: '30 6 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit the regenerated data
      actions: write    # dispatch build-and-deploy (below)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history — the script mines every post diff since 2017.
          fetch-depth: 0

      - name: Generate corrections data
        run: python3 scripts/generate_corrections.py

      - name: Commit and push changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update corrections data"
          file_pattern: '_data/corrections.json'
          branch: master

      # The commit above is pushed with GITHUB_TOKEN, which GitHub deliberately
      # prevents from triggering further workflow runs (recursion guard). So the
      # corrections pages would otherwise wait for the next human push to deploy.
      # workflow_dispatch is exempt from that guard — fire an incremental build
      # so /corrections/ refreshes promptly. Gated on an actual data change.
      - name: Trigger incremental rebuild
        if: steps.commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-and-deploy.yml --ref master -f incremental=true
