name: Generate Tag Pages

on:
  schedule:
    # Run daily at 6am UTC (10pm PT / 1am ET)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit the regenerated pages
      actions: write    # dispatch build-and-deploy (below)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Generate tag pages
        run: ruby scripts/generate_tag_pages.rb

      - name: Commit and push changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update tag pages"
          file_pattern: 'tags/*.html'
          branch: master

      # GITHUB_TOKEN pushes can't trigger build-and-deploy (recursion guard),
      # so dispatch an incremental build directly. workflow_dispatch is exempt.
      # Gated on an actual change. See generate-corrections.yml for the full note.
      - name: Trigger incremental rebuild
        if: steps.commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-and-deploy.yml --ref master -f incremental=true
