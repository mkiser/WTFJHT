---
layout: default
---

<meta name="referrer" content="no-referrer">
<link rel="stylesheet" href="{{ site.url }}{{ site.baseurl }}/public/css/quiz.css">

<div class="quiz-container">
{{ content }}
{% include quiz-renderer.html %}

<!-- Hidden Turnstile widget (programmatic render) -->
<div id="cf-turnstile" style="display:none"></div>

<!-- Fallback banner shown when Turnstile is blocked (browser privacy settings,
     network failure, or 10s timeout). One tap sends the result with
     fallback:true; Worker accepts without siteverify. -->
<div id="turnstile-fallback" style="display:none;padding:1em;background:#fff3cd;border-left:3px solid #d6a400;margin:1em 0;font-family:Helvetica,Arial,sans-serif">
  <p style="margin:0 0 0.6em;color:#333">Your browser's privacy settings blocked our bot check. One tap to save your quiz result:</p>
  <button id="turnstile-fallback-btn" type="button" disabled
          style="padding:0.6em 1.4em;font-weight:600;color:#fff;background:#e74c3c;border:none;border-radius:4px;cursor:pointer;min-height:44px">
    Save my result
  </button>
</div>
</div>

<!-- Turnstile init: Promise-based token capture. Resolves on challenge
     completion; POST in quiz.js awaits turnstileReady before sending.
     NOTE: this inline <script> must be parsed BEFORE the async Turnstile
     api.js loads so window.onTurnstileLoad is defined by the time the
     script's onload callback fires. Tag order matters. -->
<script>
(function () {
  window.turnstileToken = null;
  window.turnstileWidgetId = null;
  window.turnstileResolve = null;
  window.turnstileReady = new Promise(function (resolve) { window.turnstileResolve = resolve; });
  window.turnstileTokenUsed = false;

  window.onTurnstileLoad = function () {
    if (typeof turnstile === 'undefined') { window.turnstileResolve(null); return; }
    try {
      window.turnstileWidgetId = turnstile.render('#cf-turnstile', {
        sitekey: '0x4AAAAAADAzC0xAFcUN12kn',
        callback: function (token) { window.turnstileToken = token; window.turnstileResolve(token); },
        'error-callback': function () { window.turnstileResolve(null); },
        'expired-callback': function () {
          window.turnstileToken = null;
          if (window.turnstileWidgetId !== null) {
            try { turnstile.reset(window.turnstileWidgetId); } catch (err) { /* ignore */ }
          }
        }
      });
    } catch (err) {
      window.turnstileResolve(null);
    }
  };

  // Hard fallback: if Turnstile script never fires onload (blocked, network
  // failure, etc.), resolve with null after 10s so the quiz POST path can
  // branch to the fallback banner. Worker fail-open policy treats missing
  // token as requiring fallback:true.
  setTimeout(function () { window.turnstileResolve(null); }, 10000);

  // getFreshToken: returns a Promise that resolves with a fresh token or
  // null. Tokens are single-use; after the first POST fires we mark
  // turnstileTokenUsed=true, and the next call here resets the widget so
  // Cloudflare issues a new token. Used by retake flow in quiz.js.
  window.getFreshToken = function () {
    if (!window.turnstileTokenUsed) return window.turnstileReady;
    window.turnstileTokenUsed = false;
    window.turnstileReady = new Promise(function (resolve) {
      window.turnstileResolve = resolve;
      setTimeout(function () { resolve(null); }, 10000);
    });
    if (window.turnstileWidgetId !== null && typeof turnstile !== 'undefined') {
      try { turnstile.reset(window.turnstileWidgetId); } catch (err) { window.turnstileResolve(null); }
    } else {
      window.turnstileResolve(null);
    }
    return window.turnstileReady;
  };
})();
</script>

<!-- Cloudflare Turnstile — MUST load AFTER the inline init script above so
     window.onTurnstileLoad is defined before api.js's onload fires. -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad" async defer></script>

<script src="{{ site.url }}{{ site.baseurl }}/public/js/quiz.js?v={{ site.time | date: '%s' }}"></script>
